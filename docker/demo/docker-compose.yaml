# Demo tracer stack: Tempo, four consensus-sim nodes, and the production web
# image pointed at the bundled Tempo.
#
# Build the images first via `just demo` (which bakes the prod web image and
# the loadgen image, then runs this compose with a fresh RUN_ID so every node
# shares it and the simulated rounds line up across nodes).
#
# The web service is the SAME production image shipped to real deployments; the
# only demo-specific wiring is TEMPO_URL=tempo:3200, which Caddy reverse-proxies
# under /tempo. Real deployments set TEMPO_URL to their own Tempo endpoint.
#
# The grafana/tempo image ships no shell utilities (no wget/curl/sh), so a
# container healthcheck is not possible and `depends_on` only orders startup.
# That is fine: the loadgen nodes tolerate Tempo downtime — the OTLP exporter
# connects lazily and drops spans on export failure — so they keep running and
# resume exporting once Tempo is up. Every service uses `restart:
# unless-stopped` so the whole stack survives a daemon or host restart.

services:
  tempo:
    image: grafana/tempo:2.8.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    # The image defaults to uid 10001, which cannot write to a freshly
    # created named volume; run as root for local dev.
    user: root
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200" # Tempo HTTP API (search, trace fetch)
      - "4317:4317" # OTLP gRPC (for loadgen runs on the host)

  node-0:
    image: tracer-loadgen:local
    restart: unless-stopped
    environment:
      NODE_ID: "0"
      NUM_NODES: "4"
      OTLP_ENDPOINT: http://tempo:4317
      ROUND_INTERVAL_MS: "1000"
      RUN_ID: ${RUN_ID:-local}
    depends_on:
      - tempo

  node-1:
    image: tracer-loadgen:local
    restart: unless-stopped
    environment:
      NODE_ID: "1"
      NUM_NODES: "4"
      OTLP_ENDPOINT: http://tempo:4317
      ROUND_INTERVAL_MS: "1000"
      RUN_ID: ${RUN_ID:-local}
    depends_on:
      - tempo

  node-2:
    image: tracer-loadgen:local
    restart: unless-stopped
    environment:
      NODE_ID: "2"
      NUM_NODES: "4"
      OTLP_ENDPOINT: http://tempo:4317
      ROUND_INTERVAL_MS: "1000"
      RUN_ID: ${RUN_ID:-local}
    depends_on:
      - tempo

  node-3:
    image: tracer-loadgen:local
    restart: unless-stopped
    environment:
      NODE_ID: "3"
      NUM_NODES: "4"
      OTLP_ENDPOINT: http://tempo:4317
      ROUND_INTERVAL_MS: "1000"
      RUN_ID: ${RUN_ID:-local}
    depends_on:
      - tempo

  web:
    image: tracer-web:local
    restart: unless-stopped
    environment:
      # Caddy reverse-proxies /tempo/* to this upstream (see docker/Caddyfile).
      TEMPO_URL: tempo:3200
    ports:
      - "8080:8080" # the viewer; proxies /tempo/* to Tempo
    depends_on:
      - tempo

volumes:
  tempo-data:
